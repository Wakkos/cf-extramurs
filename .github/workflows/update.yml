name: Update Calendar & Deploy

on:
  # Ejecutar todos los días a las 7:00 AM (Europe/Madrid)
  schedule:
    - cron: '0 6 * * *'  # 6:00 UTC = 7:00 Madrid (horario de invierno)

  # Permitir ejecución manual
  workflow_dispatch:

  # Ejecutar en push a main (para testing)
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run scraper
        run: |
          python scraper.py

      - name: 📊 Stage changes
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: 💾 Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit -m "🤖 Actualización automática - $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: 🚀 Deploy to GitHub Pages
        if: steps.check_changes.outputs.changes == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,templates,configs,__pycache__,.gitignore,requirements.txt,scraper.py,debug*.py,debug*.html'

      - name: ✅ Success notification
        if: success()
        run: |
          echo "✅ Calendario actualizado y desplegado exitosamente!"
          echo "📅 Fecha: $(date +'%Y-%m-%d %H:%M:%S')"
